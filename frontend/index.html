        "name": "MoveSmart",
        "applicationCategory": "TransportApplication",

            "Women safety — SOS, fake call, guardian circle, safe walk timer",
            "Google Maps real-time traffic layer and directions",
            "AI-powered face detection and identity verification",
            "Smart route optimization reducing commute by 40%",
            "Night mode with enhanced safety protocols",
            "Analytics dashboard with commute insights",
            "Push notifications for delays and safety events",
            "Trusted contact management and live location sharing"

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "MoveSmart",
        "alternateName": ["Move Smart", "MoveSmart App", "MoveSmart Platform"],
        "url": "https://movesmart.app",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://movesmart.app/routes?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>

    <!-- Structured Data: FAQ for rich snippets -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
            {
                "@type": "Question",
                "name": "What is MoveSmart?",

                    "@type": "Answer",
                    "text": "MoveSmart is a next-generation urban mobility platform that combines real-time vehicle tracking, intelligent routing, school bus monitoring, women safety features (SOS, fake call, guardian circle), Google Maps traffic integration, and AI-powered face verification into a single ecosystem."
                }
            },

                    "@type": "Answer",
                    "text": "MoveSmart reduces commute times by up to 40% through AI-powered route optimization, real-time traffic data from Google Maps, and smart notifications about delays and alternative routes."
                }
            },
            {
                "@type": "Question",
                "name": "What safety features does MoveSmart offer for women?",
                "acceptedAnswer": {
                    "@type": "Answer",
                    "text": "MoveSmart includes emergency SOS with audio recording, fake call simulation, safe walk timer with auto-alerts, live video streaming to guardians, shake-to-alert, night mode, and a guardian circle for trusted contacts."
                }
            },
            {
                "@type": "Question",
                "name": "Can MoveSmart track school buses?",

            {
                "@type": "Question",
                "name": "Is MoveSmart free to use?",

                }
            }
